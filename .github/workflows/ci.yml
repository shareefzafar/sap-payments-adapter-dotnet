name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  spec-lint:
    name: Lint OpenAPI contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npx -y @stoplight/spectral-cli lint src/SapPaymentsAdapter.Api/openapi/sap-payments-adapter.yaml --ruleset .spectral.yaml

  codegen-diff-check:
    name: Verify generated code matches the spec
    needs: spec-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Regenerate into a temp path
        working-directory: src/SapPaymentsAdapter.Api
        run: |
          dotnet tool restore
          cp Generated/GeneratedControllers.cs /tmp/before.cs
          dotnet tool run nswag run nswag.json
      - name: Fail if committed generated code is stale
        working-directory: src/SapPaymentsAdapter.Api
        run: |
          if ! diff -q /tmp/before.cs Generated/GeneratedControllers.cs > /dev/null; then
            echo "::error::Generated/GeneratedControllers.cs is out of date with openapi/sap-payments-adapter.yaml. Run 'dotnet tool run nswag run nswag.json' and commit the result."
            git diff /tmp/before.cs Generated/GeneratedControllers.cs || true
            exit 1
          fi

  build-and-test:
    name: Build, unit + integration tests
    needs: codegen-diff-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore SapPaymentsAdapter.sln
      - run: dotnet build SapPaymentsAdapter.sln --no-restore -c Release
      - name: Unit tests
        run: dotnet test tests/SapPaymentsAdapter.UnitTests --no-build -c Release --collect:"XPlat Code Coverage" --results-directory ./coverage
      - name: Integration tests
        run: dotnet test tests/SapPaymentsAdapter.IntegrationTests --no-build -c Release --collect:"XPlat Code Coverage" --results-directory ./coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ./coverage

  # SonarQube analysis intentionally does NOT run in this pipeline.
  # GitHub-hosted runners are cloud VMs with no network path to a local
  # SonarQube instance (http://localhost:9000) — setting SONAR_HOST_URL to
  # a localhost address here would just fail trying to connect to itself.
  # Run SonarQube locally instead (see README) and re-enable this job only
  # if/when a reachable SonarQube host (e.g. SonarCloud, or a hosted
  # SonarQube server) is available.
  #
  # sonarqube:
  #   name: SonarQube quality gate
  #   needs: build-and-test
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #       with:
  #         fetch-depth: 0
  #     - uses: actions/download-artifact@v4
  #       with:
  #         name: coverage
  #         path: ./coverage
  #     - uses: SonarSource/sonarqube-scan-action@v3
  #       env:
  #         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  #         SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  #     - uses: SonarSource/sonarqube-quality-gate-action@v1
  #       timeout-minutes: 5
  #       env:
  #         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  claude-pr-review:
    name: Agentic PR review (Claude Code)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    # Map the secret to a job-level env so steps can gate on it. GitHub does
    # not allow secrets.* directly in an `if:`, so this is the supported way
    # to make the review opt-in: no key configured -> the review step is
    # skipped (job stays green) rather than failing the whole pipeline.
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Skip review (no ANTHROPIC_API_KEY configured)
        if: env.ANTHROPIC_API_KEY == ''
        run: echo "::notice::ANTHROPIC_API_KEY secret is not set — skipping the agentic PR review. Add it under repo Settings → Secrets and variables → Actions to enable this job."
      - name: Claude Code review
        if: env.ANTHROPIC_API_KEY != ''
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR against the OpenAPI contract in
            src/SapPaymentsAdapter.Api/openapi/sap-payments-adapter.yaml.
            Flag: (1) any controller/service change that doesn't match the
            spec, (2) SAP BAPIRET2 return rows not checked before trusting
            export data, (3) missing unit/integration test coverage for new
            endpoints, (4) secrets or credentials read from anywhere other
            than Vault. Keep it to the 3 most significant findings.

            Note: the PR branch is already checked out in the working directory.

            Use `gh pr comment` for top-level feedback. Use
            `mcp__github_inline_comment__create_inline_comment` (with
            `confirmed: true`) to flag specific lines. Only post GitHub
            comments — do not return the review as a chat message, or it
            will be discarded with the runner.
          # Without these tool grants Claude can run the review but has no way
          # to publish it — the findings go to stdout and vanish. See
          # https://github.com/anthropics/claude-code-action/blob/main/docs/solutions.md
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
      # This is a first-pass automated reviewer, not a merge gate — keep a
      # human as the required final approver on branch protection rules,
      # particularly given this touches payment posting logic.

  bruno-e2e:
    name: Bruno E2E against a running instance
    needs: build-and-test
    runs-on: ubuntu-latest
    services:
      vault:
        image: hashicorp/vault:1.17
        ports: ['8200:8200']
        env:
          VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
          VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
        options: --cap-add=IPC_LOCK
    env:
      VAULT_ADDR: http://localhost:8200
      VAULT_TOKEN: dev-root-token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Seed Vault dev secret
        run: |
          curl -s -X POST -H "X-Vault-Token: dev-root-token" \
            -d '{"data":{"ashost":"sap-dev.internal.bank.example","sysnr":"00","client":"100","rfcUser":"RFC_ADAPTER_USER","rfcPassword":"ci-placeholder"}}' \
            http://localhost:8200/v1/secret/data/sap-adapter/dev/rfc-credentials
      - name: Start API
        working-directory: src/SapPaymentsAdapter.Api
        env:
          ASPNETCORE_ENVIRONMENT: Development
        run: |
          dotnet run --urls http://127.0.0.1:5000 &
          npx wait-on http-get://127.0.0.1:5000/swagger/v1/swagger.json --timeout 60000
      - name: Run Bruno collection
        working-directory: "bruno/SAP Payments Adapter"
        run: npx -y @usebruno/cli run --env local -r